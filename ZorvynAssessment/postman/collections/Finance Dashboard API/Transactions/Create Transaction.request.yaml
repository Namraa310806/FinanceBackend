$kind: http-request
name: Create Transaction
method: POST
url: '{{baseUrl}}/api/transactions/'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "amount": "150.00",
      "type": "INCOME",
      "category": "Salary",
      "date": "2025-01-15",
      "notes": "Monthly salary"
    }
