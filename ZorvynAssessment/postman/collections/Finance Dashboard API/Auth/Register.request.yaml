$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/users/register/'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "johndoe",
      "email": "john@example.com",
      "password": "securepassword123",
      "first_name": "John",
      "last_name": "Doe",
      "role": "VIEWER"
    }
